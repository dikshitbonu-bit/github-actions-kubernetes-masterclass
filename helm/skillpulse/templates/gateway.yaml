{{- if .Values.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: skillpulse-gateway
  namespace: {{ .Values.namespace }}
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: skillpulse-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skillpulse-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: skillpulse-gateway
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - backendRefs:
        - name: frontend
          port: {{ .Values.frontend.service.port }}
{{- end }}
