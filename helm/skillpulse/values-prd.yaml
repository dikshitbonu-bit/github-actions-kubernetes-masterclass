namespace: skillpulse-prd

replicaCount: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

mysql:
  storage: 20Gi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

gateway:
  enabled: false

certmanager:
  enabled: false
