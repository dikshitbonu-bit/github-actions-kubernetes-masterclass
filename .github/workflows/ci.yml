name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'terraform/**'
      - 'argocd/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend

jobs:
  devsecops:
    name: DevSecOps Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Secrets Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Hadolint - Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Hadolint - Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint - Go Code Quality
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend

      - name: govulncheck - Go Dependency CVEs
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: ESLint - Frontend JS
        working-directory: frontend
        run: |
          npm init -y
          npm install eslint@8 --save-dev
          npx eslint . --ext .js || true

      - name: shellcheck - Shell Scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

      - name: kubelinter - Helm Templates
        uses: stackrox/kube-linter-action@v1
        with:
          directory: helm/skillpulse/templates

  build-push-update:
    name: Build, Push & Update Manifest
    runs-on: ubuntu-latest
    needs: devsecops
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy - Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.sha_short }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Trivy - Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.sha_short }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Update image tag in Helm values
        run: |
          sed -i "/repository:.*skillpulse-backend/{n;s|tag:.*|tag: ${{ steps.tag.outputs.sha_short }}|}" \
            helm/skillpulse/values.yaml
          sed -i "/repository:.*skillpulse-frontend/{n;s|tag:.*|tag: ${{ steps.tag.outputs.sha_short }}|}" \
            helm/skillpulse/values.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/skillpulse/values.yaml
          git diff --staged --quiet || git commit -m \
            "ci: update image tag to ${{ steps.tag.outputs.sha_short }} [skip ci]"
          git push
